version: '3.4'
services:
  db:
    image: mysql:8.0.31
    container_name: ${DB_CONTAINER_NAME}
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/directus-lib/mysql
    ports:
      - "${DB_PORT}:3306"

  pma:
    image: phpmyadmin
    container_name: ${PMA_CONTAINER_NAME}
    restart: always
    expose:
      - "${PMA_PORT}"
    ports:
      - "${PMA_PORT}:80"
    env_file:
      - ./.env
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db
    links:
      - db

volumes:
  dbdata:
